<!DOCTYPE html>
<html>
<head>
    <title>小导 - 智能导航助手</title>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-top: #f7efe5;
            --bg-bottom: #d7e7ef;
            --ink: #18222e;
            --panel: #ffffff;
            --line: #d7dee4;
            --brand: #0f766e;
            --brand-hover: #0d615b;
            --accent: #b45309;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background:
                radial-gradient(circle at 12% 8%, #fff6e9 0%, transparent 42%),
                radial-gradient(circle at 86% 2%, #d5f2ec 0%, transparent 36%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            color: var(--ink);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f2a35;
            letter-spacing: -0.03em;
            flex-shrink: 0;
        }

        .hero-subtitle {
            color: #34505f;
            font-size: 0.95rem;
            margin-top: 0.35rem;
        }

        #messages {
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            min-height: 300px;
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: hsl(0, 0%, 100%);
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        #messages::-webkit-scrollbar {
            width: 8px;
        }

        #messages::-webkit-scrollbar-track {
            background: hsl(210, 40%, 96.1%);
            border-radius: 4px;
        }

        #messages::-webkit-scrollbar-thumb {
            background: hsl(215.4, 16.3%, 56.9%);
            border-radius: 4px;
        }

        #messages::-webkit-scrollbar-thumb:hover {
            background: hsl(215.4, 16.3%, 46.9%);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.625rem 0.875rem;
            font-size: 0.875rem;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            border-radius: 0.375rem;
            background: hsl(0, 0%, 100%);
            color: hsl(222.2, 84%, 4.9%);
            transition: all 0.15s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: hsl(221.2, 83.2%, 53.3%);
            box-shadow: 0 0 0 3px hsl(221.2, 83.2%, 53.3%, 0.1);
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.625rem 0.875rem;
            font-size: 0.875rem;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            border-radius: 0.375rem;
            background: hsl(0, 0%, 100%);
            color: hsl(222.2, 84%, 4.9%);
            transition: all 0.15s ease;
            outline: none;
            resize: vertical;
            font-family: inherit;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: hsl(221.2, 83.2%, 53.3%);
            box-shadow: 0 0 0 3px hsl(221.2, 83.2%, 53.3%, 0.1);
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid transparent;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        button:active {
            transform: scale(0.98);
        }

        button:focus-visible {
            outline: 2px solid hsl(221.2, 83.2%, 53.3%);
            outline-offset: 2px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Primary button style */
        button.btn-primary {
            background: var(--brand);
            color: hsl(0, 0%, 100%);
            border-color: var(--brand);
        }

        button.btn-primary:hover:not(:disabled) {
            background: var(--brand-hover);
            border-color: var(--brand-hover);
        }

        button.btn-primary.recording,
        button.btn-primary.recording-video {
            background: hsl(0, 84.2%, 60.2%);
            border-color: hsl(0, 84.2%, 60.2%);
            animation: pulse 1.5s ease-in-out infinite;
        }

        button.btn-primary.recording:hover:not(:disabled),
        button.btn-primary.recording-video:hover:not(:disabled) {
            background: hsl(0, 84.2%, 50%);
            border-color: hsl(0, 84.2%, 50%);
        }

        /* Secondary button style */
        button.btn-secondary {
            background: hsl(0, 0%, 100%);
            color: hsl(222.2, 47.4%, 11.2%);
            border-color: hsl(214.3, 31.8%, 91.4%);
        }

        button.btn-secondary:hover:not(:disabled) {
            background: hsl(210, 40%, 98%);
            border-color: hsl(214.3, 31.8%, 81.4%);
        }

        .message {
            margin: 0.75rem 0;
            padding: 0.75rem 1rem;
            background: hsl(210, 40%, 98%);
            border-radius: 0.5rem;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            font-size: 0.875rem;
        }

        .message strong {
            color: hsl(222.2, 47.4%, 11.2%);
            font-weight: 600;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 hsl(0, 84.2%, 60.2%, 0.7);
            }
            50% {
                opacity: 0.9;
                box-shadow: 0 0 0 8px hsl(0, 84.2%, 60.2%, 0);
            }
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-shrink: 0;
        }

        .controls #voiceBtn,
        .controls #videoBtn {
            flex: 1;
        }

        .controls button:not(#voiceBtn):not(#videoBtn) {
            width: 140px;
            flex-shrink: 0;
        }

        .text-input-container {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-shrink: 0;
        }

        .text-input-container input[type="text"] {
            flex: 1;
        }

        .text-input-container button {
            width: 100px;
            flex-shrink: 0;
        }

        .configuration-container {
            background: hsl(0, 0%, 100%);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            flex-shrink: 0;
        }

        .configuration-container h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: hsl(222.2, 84%, 4.9%);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .config-field {
            margin-bottom: 1.25rem;
        }

        .config-field:last-child {
            margin-bottom: 0;
        }

        .config-field label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: hsl(222.2, 47.4%, 11.2%);
            font-size: 0.875rem;
        }

        .error-message {
            padding: 0.875rem 1rem;
            background: hsl(0, 84.2%, 95%);
            border: 1px solid hsl(0, 84.2%, 85%);
            border-radius: 0.5rem;
            display: none;
            color: hsl(0, 84.2%, 30%);
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            flex-shrink: 0;
        }


        .model-options {
            display: flex;
            flex-direction: row;
            gap: 0.75rem;
        }

        .model-option {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid hsl(214.3, 31.8%, 91.4%);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            background: hsl(0, 0%, 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.5rem;
        }

        .model-option:hover:not(.disabled) {
            border-color: hsl(221.2, 83.2%, 53.3%);
            background: hsl(221.2, 83.2%, 98%);
        }

        .model-option.selected {
            border-color: hsl(221.2, 83.2%, 53.3%);
            background: hsl(221.2, 83.2%, 95%);
        }

        .model-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: hsl(0, 0%, 98%);
        }

        .model-option-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .model-option input[type="radio"] {
            margin: 0;
            cursor: pointer;
            flex-shrink: 0;
        }

        .model-option.disabled input[type="radio"] {
            cursor: not-allowed;
        }

        .model-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .model-name-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-height: 1.25rem;
        }

        .model-name {
            font-weight: 600;
            color: hsl(222.2, 84%, 4.9%);
        }

        .model-unavailable-reason {
            font-size: 0.625rem;
            color: hsl(215.4, 16.3%, 56.9%);
            font-style: italic;
            white-space: nowrap;
        }

        .model-tags {
            display: flex;
            gap: 0.375rem;
            flex-wrap: wrap;
        }

        .model-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 0.25rem;
            background: hsl(214.3, 31.8%, 91.4%);
            color: hsl(222.2, 47.4%, 11.2%);
        }

        .model-tag.text {
            background: hsl(200, 95%, 90%);
            color: hsl(200, 95%, 30%);
        }

        .model-tag.audio {
            background: hsl(280, 85%, 90%);
            color: hsl(280, 85%, 30%);
        }

        .model-tag.image {
            background: hsl(25, 95%, 90%);
            color: hsl(25, 95%, 30%);
        }

        .model-tag.tool {
            background: hsl(142, 71%, 90%);
            color: hsl(142, 71%, 30%);
        }

        .tools-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: hsl(222.2, 47.4%, 11.2%);
            font-size: 0.875rem;
        }

        .tools-disabled-hint {
            font-size: 0.75rem;
            color: hsl(215.4, 16.3%, 56.9%);
            font-weight: 400;
            font-style: italic;
            margin-left: 0.5rem;
        }

        .tools-list {
            display: flex;
            gap: 0.5rem;
        }

        .tool-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.75rem;
            background: hsl(0, 0%, 100%);
            border: 2px solid hsl(214.3, 31.8%, 91.4%);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            color: hsl(222.2, 47.4%, 11.2%);
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .tool-item.disabled {
            background: hsl(0, 0%, 96%);
            color: hsl(215.4, 16.3%, 56.9%);
            border-color: hsl(214.3, 31.8%, 91.4%);
            opacity: 0.6;
        }

        #videoPreview {
            width: 100%;
            max-width: 640px;
            border-radius: 0.5rem;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            background: hsl(0, 0%, 0%);
            display: none;
            margin: 1rem 0;
            flex-shrink: 0;
        }

        #videoPreview.active {
            display: block;
        }

        .video-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .quick-command-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .quick-chip {
            border: 1px dashed #9fb3c0;
            background: #f4f8fb;
            color: #0f3748;
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s ease;
        }

        .quick-chip:hover {
            border-color: var(--brand);
            background: #e7f4f2;
            color: #0a4a45;
        }

        .fatigue-panel {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08);
            padding: 0.85rem 1rem;
        }

        .fatigue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.6rem;
        }

        .fatigue-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #134252;
        }

        .fatigue-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 0.2rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .fatigue-badge.normal {
            background: #ddf6ea;
            color: #0a5f42;
        }

        .fatigue-badge.attention {
            background: #fff2cf;
            color: #8a5200;
        }

        .fatigue-badge.drowsy {
            background: #ffe0df;
            color: #a12929;
        }

        .fatigue-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.45rem 0.8rem;
            font-size: 0.8rem;
            color: #284456;
        }

        .fatigue-cell strong {
            color: #123446;
            margin-right: 0.35rem;
        }

        .fatigue-safety-note {
            margin-top: 0.65rem;
            font-size: 0.74rem;
            color: #6e5a1c;
            background: #fff9e8;
            border: 1px dashed #e5cb7a;
            border-radius: 0.4rem;
            padding: 0.4rem 0.55rem;
        }
        /* ── 导航结果面板样式 ── */
        .nav-panel {
            background: hsl(0, 0%, 100%);
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin: 0.75rem 0;
            overflow: hidden;
        }
        .nav-panel-header {
            background: hsl(221.2, 83.2%, 53.3%);
            color: white;
            padding: 0.625rem 1rem;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .nav-panel-body {
            padding: 1rem;
        }
        .intent-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }
        .intent-table th,
        .intent-table td {
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .intent-table th {
            background: hsl(210, 40%, 96.1%);
            font-weight: 600;
            color: hsl(222.2, 47.4%, 11.2%);
        }
        .intent-badge {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .intent-badge.basic { background: hsl(200, 95%, 90%); color: hsl(200, 95%, 30%); }
        .intent-badge.life { background: hsl(142, 71%, 90%); color: hsl(142, 71%, 30%); }
        .intent-badge.multi { background: hsl(280, 85%, 90%); color: hsl(280, 85%, 30%); }
        .intent-badge.compound { background: hsl(25, 95%, 90%); color: hsl(25, 95%, 30%); }
        .confidence-bar {
            display: inline-block;
            height: 6px;
            border-radius: 3px;
            background: hsl(142, 71%, 45%);
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        #mapContainer.active {
            display: block;
        }
        .nav-status {
            display: none;
            padding: 0.5rem 1rem;
            background: hsl(210, 40%, 96.1%);
            border-radius: 0.375rem;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            font-size: 0.8rem;
            color: hsl(222.2, 47.4%, 11.2%);
            margin: 0.5rem 0;
            flex-shrink: 0;
        }
        .nav-status.active {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-status .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid hsl(214.3, 31.8%, 91.4%);
            border-top-color: hsl(221.2, 83.2%, 53.3%);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .poi-candidates {
            list-style: none;
            padding: 0;
        }
        .poi-candidates li {
            padding: 0.5rem 0.75rem;
            border: 1px solid hsl(214.3, 31.8%, 91.4%);
            border-radius: 0.375rem;
            margin-bottom: 0.375rem;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.8rem;
        }
        .poi-candidates li:hover {
            background: hsl(221.2, 83.2%, 95%);
            border-color: hsl(221.2, 83.2%, 53.3%);
        }
        .mode-btn {
            padding: 8px 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s ease;
        }
        .mode-btn:hover {
            border-color: #4CAF50;
            background: #f1f8e9;
        }

        @media (max-width: 760px) {
            body {
                padding: 1rem;
                gap: 1rem;
            }

            .controls {
                flex-wrap: wrap;
            }

            .controls button,
            .text-input-container button {
                width: 100%;
            }

            .text-input-container {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div>
        <h1>小导 | 车载导航助手</h1>
        <p class="hero-subtitle">支持语音和文本输入，自动完成意图识别、槽位提取、POI 检索与路线规划。</p>
    </div>

    <div class="configuration-container">
        <h3>⚙️ 会话配置</h3>

        <div class="config-field">
            <label for="instructions">系统指令</label>
            <textarea id="instructions" placeholder="请输入系统提示词...">你是车载导航助手小导。优先完成导航相关需求，回复简洁清晰，必要时追问缺失信息。</textarea>
        </div>

        <div class="config-field">
            <label for="agentName">智能体名称</label>
            <input type="text" id="agentName" placeholder="请输入智能体名称" value="小导" />
        </div>


        <div class="config-field">
            <label>Model Provider</label>
            <div class="model-options" id="modelOptions">
                <label class="model-option" data-provider="dashscope">
                    <div class="model-option-header">
                        <input type="radio" name="modelProvider" value="dashscope" checked />
                        <div class="model-info">
                            <div class="model-name-line">
                                <span class="model-name">DashScope</span>
                                <span class="model-unavailable-reason" style="display: none;"></span>
                            </div>
                            <div class="model-tags">
                                <span class="model-tag audio">Audio</span>
                                <span class="model-tag image">Image</span>
                            </div>
                        </div>
                    </div>
                </label>
                <label class="model-option" data-provider="gemini">
                    <div class="model-option-header">
                        <input type="radio" name="modelProvider" value="gemini" />
                        <div class="model-info">
                            <div class="model-name-line">
                                <span class="model-name">Gemini</span>
                                <span class="model-unavailable-reason" style="display: none;"></span>
                            </div>
                            <div class="model-tags">
                                <span class="model-tag text">Text</span>
                                <span class="model-tag audio">Audio</span>
                                <span class="model-tag image">Image</span>
                                <span class="model-tag tool">Tool</span>
                            </div>
                        </div>
                    </div>
                </label>
                <label class="model-option" data-provider="openai">
                    <div class="model-option-header">
                        <input type="radio" name="modelProvider" value="openai" />
                        <div class="model-info">
                            <div class="model-name-line">
                                <span class="model-name">OpenAI</span>
                                <span class="model-unavailable-reason" style="display: none;"></span>
                            </div>
                            <div class="model-tags">
                                <span class="model-tag text">Text</span>
                                <span class="model-tag audio">Audio</span>
                                <span class="model-tag tool">Tool</span>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
        </div>

        <div class="config-field">
            <label class="tools-label">
                Equipped Tools
                <span class="tools-disabled-hint" id="toolsDisabledHint" style="display: none;">(Not supported by this model)</span>
            </label>
            <div class="tools-list" id="toolsList">
                <div class="tool-item" data-tool="execute_python_code">🐍 execute_python_code</div>
                <div class="tool-item" data-tool="execute_shell_command">💻 execute_shell_command</div>
                <div class="tool-item" data-tool="view_text_file">📄 view_text_file</div>
            </div>
        </div>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <div class="controls">
        <button id="voiceBtn" class="btn-primary" onclick="toggleVoice()">🎤 开始语音对话</button>
        <button id="videoBtn" class="btn-primary" onclick="toggleVideo()">📹 开始视频采集</button>
        <button class="btn-secondary" onclick="disconnect()">❌ 断开连接</button>
    </div>

    <div class="video-container">
        <video id="videoPreview" autoplay muted playsinline></video>
    </div>

    <div class="fatigue-panel" id="fatiguePanel">
        <div class="fatigue-header">
            <span class="fatigue-title">驾驶状态评估</span>
            <span id="fatigueLevelBadge" class="fatigue-badge normal">normal</span>
        </div>
        <div class="fatigue-grid">
            <div class="fatigue-cell"><strong>置信度</strong><span id="fatigueConfidence">0%</span></div>
            <div class="fatigue-cell"><strong>采样率</strong><span id="fatigueFps">2 fps</span></div>
            <div class="fatigue-cell"><strong>视觉信号</strong><span id="fatigueVisual">-</span></div>
            <div class="fatigue-cell"><strong>行为信号</strong><span id="fatigueBehavior">-</span></div>
        </div>

        <input type="text" id="textInput" placeholder="例如：从武汉理工到光谷广场，开车避堵" />

    <!-- 导航状态栏 -->
    <div id="navStatus" class="nav-status">
        <span class="spinner"></span>
        <span id="navStatusText">正在分析导航意图...</span>
    </div>

    <!-- 地图容器 -->
    <div id="mapContainer" style="width:100%;height:420px;border-radius:0.5rem;border:1px solid hsl(214.3,31.8%,91.4%);display:none;margin:0.75rem 0;position:relative;">
        <div id="mapInner" style="width:100%;height:100%;"></div>
    </div>

    <!-- 意图/槽位分析面板 -->
    <div id="intentPanel" style="display:none;"></div>

    <div id="messages"></div>

    <script>
        let ws = null;
        let audioContext = null;  // For recording, 16kHz
        let playbackAudioContext = null;  // For playback, 24kHz
        let mediaStream = null;
        let videoStream = null;  // For video recording
        let videoFrameInterval = null;  // Interval for sending video frames
        let videoCanvas = null;  // Canvas for capturing video frames
        let videoCanvasCtx = null;  // Canvas context
        let faceDetector = null;
        let isAnalyzingFrame = false;
        let isRecording = false;
        let isRecordingVideo = false;
        let isPlaying = false;
        let audioPlaybackNode = null;
        let audioPlaybackQueue = [];  // Store decoded Float32Array
        let audioPlaybackIndex = 0;
        let sessionId = "session1";  // Session ID
        let sessionCreated = false;  // Track if session has been created
        let pendingUserInputTs = 0;
        let waitingAgentResponse = false;

        // 驾驶状态评估参数
        const NORMAL_FPS = 1;
        const ALERT_FPS = 1;
        const ATTENTION_SCORE = 0.45;
        const DROWSY_SCORE = 0.72;
        const ATTENTION_HOLD_MS = 6000;
        const DROWSY_HOLD_MS = 8000;
        const HIGH_FPS_HOLD_MS = 15000;

        let currentVideoFps = NORMAL_FPS;
        let highFpsUntil = 0;
        let attentionStartTs = null;
        let drowsyStartTs = null;
        let lastRiskLevel = "normal";
        let emaResponseLatencyMs = 0;
        let visualWindow = [];

        const fatigueState = {
            level: "normal",
            confidence: 0,
            visualScore: 0,
            behaviorScore: 0,
            fusionScore: 0,
            headDownRatio: 0,
            noFaceRatio: 0,
        };

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function initFaceDetector() {
            if ("FaceDetector" in window) {
                try {
                    faceDetector = new FaceDetector({
                        fastMode: true,
                        maxDetectedFaces: 1,
                    });
                } catch (err) {
                    console.warn("FaceDetector init failed:", err);
                }
            }
        }

        function updateFatiguePanel() {
            const levelBadge = document.getElementById("fatigueLevelBadge");
            const confidenceEl = document.getElementById("fatigueConfidence");
            const fpsEl = document.getElementById("fatigueFps");
            const visualEl = document.getElementById("fatigueVisual");
            const behaviorEl = document.getElementById("fatigueBehavior");

            levelBadge.textContent = fatigueState.level;
            levelBadge.className = "fatigue-badge " + fatigueState.level;
            confidenceEl.textContent = Math.round(fatigueState.confidence * 100) + "%";
            fpsEl.textContent = currentVideoFps + " fps";
            visualEl.textContent =
                "低头" + Math.round(fatigueState.headDownRatio * 100) + "% / 无脸" +
                Math.round(fatigueState.noFaceRatio * 100) + "%";
            behaviorEl.textContent =
                "延迟 " + Math.round(emaResponseLatencyMs || 0) + "ms";
        }

        function maybeSendFatigueAlert(level, confidence) {
            if (level === lastRiskLevel) {
                return;
            }
            lastRiskLevel = level;

            if (level === "attention") {
                addMessage("System", "⚠️ 疲劳风险提示：检测到注意力下降，请保持专注（AI仅辅助）");
            } else if (level === "drowsy") {
                addMessage("System", "🚨 疲劳风险提示：疑似困倦，请尽快靠边休息（AI仅辅助）");
            } else {
                addMessage("System", "✅ 驾驶状态回到 normal");
            }
        }

        function computeBehaviorScore() {
            if (!emaResponseLatencyMs) {
                return 0;
            }
            return clamp((emaResponseLatencyMs - 1500) / 3500, 0, 1);
        }

        function evaluateFatigue(nowTs) {
            const recent = visualWindow.filter((item) => nowTs - item.ts <= 20000);
            visualWindow = recent;

            let headDownRatio = 0;
            let noFaceRatio = 0;
            if (recent.length > 0) {
                const headDownCount = recent.filter((x) => x.headDown).length;
                const noFaceCount = recent.filter((x) => !x.facePresent).length;
                headDownRatio = headDownCount / recent.length;
                noFaceRatio = noFaceCount / recent.length;
            }

            const visualScore = clamp(0.65 * headDownRatio + 0.35 * noFaceRatio, 0, 1);
            const behaviorScore = computeBehaviorScore();
            const fusionScore = clamp(0.65 * visualScore + 0.35 * behaviorScore, 0, 1);

            let candidate = "normal";
            if (fusionScore >= DROWSY_SCORE) {
                candidate = "drowsy";
            } else if (fusionScore >= ATTENTION_SCORE) {
                candidate = "attention";
            }

            if (candidate === "drowsy") {
                drowsyStartTs = drowsyStartTs || nowTs;
                attentionStartTs = attentionStartTs || nowTs;
            } else if (candidate === "attention") {
                attentionStartTs = attentionStartTs || nowTs;
                drowsyStartTs = null;
            } else {
                attentionStartTs = null;
                drowsyStartTs = null;
            }

            let finalLevel = "normal";
            if (drowsyStartTs && nowTs - drowsyStartTs >= DROWSY_HOLD_MS) {
                finalLevel = "drowsy";
            } else if (attentionStartTs && nowTs - attentionStartTs >= ATTENTION_HOLD_MS) {
                finalLevel = "attention";
            }

            if (candidate !== "normal") {
                highFpsUntil = Math.max(highFpsUntil, nowTs + HIGH_FPS_HOLD_MS);
            }

            fatigueState.level = finalLevel;
            fatigueState.visualScore = visualScore;
            fatigueState.behaviorScore = behaviorScore;
            fatigueState.fusionScore = fusionScore;
            fatigueState.headDownRatio = headDownRatio;
            fatigueState.noFaceRatio = noFaceRatio;
            fatigueState.confidence = clamp(0.25 + 0.75 * fusionScore, 0, 1);

            maybeSendFatigueAlert(finalLevel, fatigueState.confidence);
            updateFatiguePanel();
            updateVideoSamplingRate();
        }

        async function collectVisualSignals(videoPreview) {
            if (!faceDetector || isAnalyzingFrame) {
                return;
            }
            if (videoPreview.readyState < 2 || !videoPreview.videoWidth || !videoPreview.videoHeight) {
                return;
            }

            isAnalyzingFrame = true;
            try {
                const faces = await faceDetector.detect(videoPreview);
                const ts = Date.now();

                if (!faces || faces.length === 0) {
                    visualWindow.push({ ts, facePresent: false, headDown: false });
                } else {
                    const box = faces[0].boundingBox || { y: 0, height: 0 };
                    const centerY = (box.y + box.height * 0.5) / videoPreview.videoHeight;
                    const headDown = centerY > 0.62;
                    visualWindow.push({ ts, facePresent: true, headDown });
                }

                evaluateFatigue(ts);
            } catch (err) {
                console.warn("Face detection failed:", err);
            } finally {
                isAnalyzingFrame = false;
            }
        }

        function updateVideoSamplingRate() {
            const desiredFps = (Date.now() < highFpsUntil) ? ALERT_FPS : NORMAL_FPS;
            if (desiredFps === currentVideoFps) {
                return;
            }
            currentVideoFps = desiredFps;
            updateFatiguePanel();
            if (isRecordingVideo) {
                startSendingVideoFrames();
            }
        }

        function onUserInputCommitted() {
            pendingUserInputTs = Date.now();
            waitingAgentResponse = true;
        }

        function onAgentResponseStarted() {
            if (!waitingAgentResponse || !pendingUserInputTs) {
                return;
            }
            const latency = Date.now() - pendingUserInputTs;
            emaResponseLatencyMs = emaResponseLatencyMs
                ? (0.75 * emaResponseLatencyMs + 0.25 * latency)
                : latency;
            waitingAgentResponse = false;
            pendingUserInputTs = 0;

            evaluateFatigue(Date.now());
        }

        // Update send button state for text-based navigation flow
        function updateSendButtonState() {
            const textInput = document.getElementById("textInput");
            const sendBtn = document.getElementById("sendBtn");
            const hasText = textInput.value.trim().length > 0;
            const socketReady = ws && ws.readyState === WebSocket.OPEN;
            sendBtn.disabled = !(hasText && socketReady);
        }

        async function ensureSessionCreated() {
            if (sessionCreated) {
                return;
            }

            const instructions = document.getElementById("instructions").value.trim();
            if (!instructions) {
                throw new Error("系统指令不能为空");
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                throw new Error("WebSocket 尚未连接");
            }

            const agentName = document.getElementById("agentName").value.trim() || "小导";
            const selectedModel = document.querySelector('input[name="modelProvider"]:checked');
            const modelProvider = selectedModel ? selectedModel.value : "dashscope";

            addMessage("System", "📝 正在创建会话...");
            ws.send(JSON.stringify({
                type: "client_session_create",
                config: {
                    instructions: instructions,
                    agent_name: agentName,
                    model_provider: modelProvider
                }
            }));

            await new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    reject(new Error("会话创建超时"));
                }, 5000);

                const checkSession = setInterval(() => {
                    if (sessionCreated) {
                        clearTimeout(timeout);
                        clearInterval(checkSession);
                        resolve();
                    }
                }, 100);
            });
        }

        // Send text message to backend
        async function sendTextMessage() {
            const textInput = document.getElementById("textInput");
            const text = textInput.value.trim();

            if (!text) {
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showError("⚠️ WebSocket is not connected!");
                return;
            }

            try {
                await ensureSessionCreated();
            } catch (err) {
                showError("⚠️ " + err.message);
                addMessage("System", "⚠️ " + err.message);
                return;
            }

            // Send ClientTextAppendEvent
            ws.send(JSON.stringify({
                type: "client_text_append",
                session_id: sessionId,
                text: text
            }));

            onUserInputCommitted();

            addMessage("You", text);
            textInput.value = "";
            updateSendButtonState();
        }

        async function sendQuickCommand(text) {
            const textInput = document.getElementById("textInput");
            textInput.value = text;
            updateSendButtonState();
            await sendTextMessage();
        }

        // Add event listener for text input
        document.addEventListener("DOMContentLoaded", function() {
            const textInput = document.getElementById("textInput");

            // Update button state on input
            textInput.addEventListener("input", updateSendButtonState);

            // Send on Enter key
            textInput.addEventListener("keypress", function(e) {
                if (e.key === "Enter" && !document.getElementById("sendBtn").disabled) {
                    sendTextMessage();
                }
            });
        });

        // Used to accumulate transcript text
        let currentTranscript = "";
        let currentTranscriptElement = null;
        let currentResponseTranscript = "";
        let currentResponseTranscriptElement = null;

        // Check available models on page load
        async function checkAvailableModels() {
            try {
                const apiUrl = `${window.location.protocol}//${window.location.host}/api/check-models`;

                const response = await fetch(apiUrl);
                const availability = await response.json();

                console.log("Model availability:", availability);

                let hasAvailableModel = false;

                // Update UI based on availability
                const modelOptions = document.querySelectorAll('.model-option');
                modelOptions.forEach(option => {
                    const provider = option.getAttribute('data-provider');
                    const radio = option.querySelector('input[type="radio"]');
                    const unavailableReason = option.querySelector('.model-unavailable-reason');

                    if (!availability[provider]) {
                        option.classList.add('disabled');
                        radio.disabled = true;

                        // Show unavailable reason
                        const providerName = provider.charAt(0).toUpperCase() + provider.slice(1);
                        unavailableReason.textContent = `(${providerName.toUpperCase()}_API_KEY not set)`;
                        unavailableReason.style.display = 'inline';

                        // If this was the selected option, uncheck it
                        if (radio.checked) {
                            radio.checked = false;
                        }
                    } else {
                        hasAvailableModel = true;
                        unavailableReason.style.display = 'none';
                    }
                });

                // If no model is selected after checking availability, select first available
                const selectedRadio = document.querySelector('input[name="modelProvider"]:checked');
                if (!selectedRadio && hasAvailableModel) {
                    for (const option of modelOptions) {
                        const provider = option.getAttribute('data-provider');
                        if (availability[provider]) {
                            option.querySelector('input[type="radio"]').checked = true;
                            option.classList.add('selected');
                            break;
                        }
                    }
                }

                // Disable recording button if no model is available
                const voiceBtn = document.getElementById('voiceBtn');
                if (!hasAvailableModel) {
                    voiceBtn.disabled = true;
                    showError('⚠️ No model API keys configured. Please set at least one API key to start voice chat.');
                } else {
                    voiceBtn.disabled = false;
                }

                // Add click handlers for model options
                modelOptions.forEach(option => {
                    option.addEventListener('click', function() {
                        if (!this.classList.contains('disabled')) {
                            modelOptions.forEach(opt => opt.classList.remove('selected'));
                            this.classList.add('selected');
                            updateToolsDisplay();
                        }
                    });
                });

                // Mark initially selected option
                const currentSelected = document.querySelector('input[name="modelProvider"]:checked');
                if (currentSelected) {
                    currentSelected.closest('.model-option').classList.add('selected');
                }

                // Update tools display based on initial selection
                updateToolsDisplay();

            } catch (error) {
                console.error("Failed to check model availability:", error);
                showError("⚠️ Failed to check model availability. Please refresh the page.");
            }
        }

        function updateToolsDisplay() {
            const selectedRadio = document.querySelector('input[name="modelProvider"]:checked');
            const toolItems = document.querySelectorAll('.tool-item');
            const toolsDisabledHint = document.getElementById('toolsDisabledHint');

            if (selectedRadio) {
                const provider = selectedRadio.value;
                // Enable tools for Gemini and OpenAI, disable for others
                if (provider === 'gemini' || provider === 'openai') {
                    toolItems.forEach(item => item.classList.remove('disabled'));
                    toolsDisabledHint.style.display = 'none';
                } else {
                    toolItems.forEach(item => item.classList.add('disabled'));
                    toolsDisabledHint.style.display = 'inline';
                }
            } else {
                toolItems.forEach(item => item.classList.add('disabled'));
                toolsDisabledHint.style.display = 'inline';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            errorDiv.innerText = message;
            errorDiv.style.display = "block";
            setTimeout(() => {
                errorDiv.style.display = "none";
            }, 5000);
        }

        async function connect() {
            const userId = "You";
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${userId}/${sessionId}`;

            console.log(`Connecting to WebSocket: ${wsUrl}`);
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                addMessage("System", "✅ WebSocket connected successfully, ready for voice conversation");
                updateSendButtonState();
            };

            ws.onmessage = async function(event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log("Received message:", data);

                    // Handle ServerEvents
                    switch (data.type) {
                        case "server_session_created":
                            sessionCreated = true;
                            addMessage("System", `✅ Session created: ${data.session_id}`);
                            break;

                        case "agent_ready":
                            addMessage("System", `🤖 Agent ${data.agent_name} is ready`);
                            break;

                        case "agent_response_created":
                            onAgentResponseStarted();
                            addMessage("System", `💬 Agent ${data.agent_name} started generating response...`);
                            break;

                        case "agent_response_audio_delta":
                            // Receive audio data and add to playback queue
                            queueAudioChunk(data.delta);
                            break;

                        case "agent_response_audio_done":
                            addMessage("System", "🔊 Audio response completed");
                            break;

                        case "agent_response_audio_transcript_delta":
                            onAgentResponseStarted();
                            // Agent response transcript text
                            appendResponseTranscript(data.agent_name, data.delta || "");
                            break;

                        case "agent_response_audio_transcript_done":
                            // Complete Agent response transcript message
                            finishResponseTranscript();
                            break;

                        case "agent_input_transcription_delta":
                            // User input transcript text
                            appendTranscript("You", data.delta || "");
                            break;

                        case "agent_input_transcription_done":
                            appendTranscript("You", data.transcript || "");
                            // Complete user input transcript message
                            finishTranscript();
                            onUserInputCommitted();
                            addMessage("System", `📝 User input recognition completed`);
                            break;

                        case "agent_input_started":
                            addMessage("System", "🎤 Voice input started");
                            break;

                        case "agent_input_done":
                            addMessage("System", "⏹️ Voice input ended");
                            break;

                        case "agent_response_done":
                            addMessage("System", `✅ Response completed (input tokens: ${data.input_tokens}, output tokens: ${data.output_tokens})`);
                            break;

                        case "agent_response_tool_use_delta":
                            addMessage("System", `🔧 Tool call: ${data.name}`);
                            break;

                        case "agent_response_tool_use_done":
                            // Display tool use with complete information
                            const toolUseInfo = JSON.stringify(data.tool_use, null, 2);
                            addMessage(data.agent_name, `🔧 Tool Use:\n${toolUseInfo}`);
                            break;

                        case "agent_response_tool_result":
                            // Display tool result with complete information
                            const toolResultInfo = JSON.stringify(data.tool_result, null, 2);
                            addMessage(data.agent_name, `✅ Tool Result:\n${toolResultInfo}`);
                            break;

                        case "agent_error":
                            addMessage("Error", `❌ ${data.error_type}: ${data.message}`);
                            break;

                        case "agent_ended":
                            addMessage("System", `👋 Agent ${data.agent_name} has ended`);
                            break;

                        case "server_session_ended":
                            addMessage("System", `🔚 Session ${data.session_id} has ended`);
                            break;

                        // ── Whisper 转写结果 ──
                        case "whisper_transcription":
                            addMessage("You (Whisper)", data.transcript || "");
                            addMessage("System", "📝 Whisper 语音转写完成");
                            break;

                        // ── 视觉分析结果 ──
                        case "visual_analysis_result":
                            addMessage("视觉分析", "👁️ " + (data.description || ""));
                            break;

                        // ── 导航相关事件 ──
                        case "nav_status_update":
                            updateNavStatus(data.status, data.message);
                            if (data.status === "processing") {
                                addMessage("System", "🔄 " + (data.message || "导航分析中..."));
                            }
                            break;

                        case "nav_intent_result":
                            renderIntentPanel(data.intent_result);
                            updateNavStatus("done", "意图分析完成");
                            break;

                        case "nav_route_result":
                            renderRouteResult(data.route_result);
                            showRouteOnMap(data.route_result);
                            updateNavStatus("done", "路线规划完成");
                            break;

                        case "nav_poi_candidates":
                            renderPOICandidates(
                                data.candidates,
                                data.origin_candidates,
                                data.destination_candidates,
                            );
                            showCandidatesOnMap(data.candidates || []);
                            break;

                        case "nav_missing_slots":
                            renderMissingSlots(data.missing, data.current_slots);
                            break;

                        case "nav_error":
                            updateNavStatus("error", data.message || "导航出错");
                            addMessage("System", "❌ " + (data.message || "导航分析失败"));
                            break;

                        default:
                            console.log("Unhandled event type:", data.type);
                            break;
                    }
                } catch (e) {
                    console.error("Error processing message:", e);
                }
            };

            ws.onclose = function() {
                addMessage("System", "❌ Disconnected");
                stopVoice();
                stopVideoRecording();  // Also stop video recording on disconnect
                sessionCreated = false;  // Reset session state
                updateSendButtonState();
            };

            ws.onerror = function() {
                addMessage("System", "⚠️ Connection error");
            };
        }

        async function toggleVoice() {
            if (!isRecording) {
                await startVoice();
            } else {
                stopVoice();
            }
        }

        async function startVoice() {
            try {
                // Check if recording button is disabled
                const voiceBtn = document.getElementById("voiceBtn");
                if (voiceBtn.disabled) {
                    showError("⚠️ No model API keys configured. Please set at least one API key to start voice chat.");
                    return;
                }

                // Validate instructions
                const instructions = document.getElementById("instructions").value.trim();
                if (!instructions) {
                    showError("⚠️ Instructions cannot be empty! Please enter instructions before starting voice chat.");
                    return;
                }

                // Check if WebSocket is connected
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    showError("⚠️ WebSocket is not connected! Please wait for connection.");
                    return;
                }

                await ensureSessionCreated();

                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000
                    });
                }

                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 16000
                    }
                });

                const source = audioContext.createMediaStreamSource(mediaStream);

                // Use ScriptProcessorNode to process audio
                const processor = audioContext.createScriptProcessor(4096, 1, 1);

                let audioChunkCount = 0;
                processor.onaudioprocess = function(e) {
                    if (!isRecording) return;

                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = convertToPCM16(inputData);
                    const base64Audio = arrayBufferToBase64(pcmData);

                    if (ws && ws.readyState === WebSocket.OPEN) {
                        audioChunkCount++;
                        if (audioChunkCount % 10 === 0) {
                            console.log(`Sending audio chunk ${audioChunkCount}`);
                        }
                        // Send ClientAudioAppendEvent
                        ws.send(JSON.stringify({
                            type: "client_audio_append",
                            session_id: sessionId,
                            audio: base64Audio,
                            format: {
                                rate: 16000,
                                type: "audio/pcm",
                            }
                        }));
                    }
                };

                source.connect(processor);
                const dummyGain = audioContext.createGain();
                dummyGain.gain.value = 0;  // Mute to avoid feedback
                processor.connect(dummyGain);
                dummyGain.connect(audioContext.destination);

                isRecording = true;
                document.getElementById("voiceBtn").classList.add("recording");
                document.getElementById("voiceBtn").innerText = "🔴 语音对话中";
                addMessage("System", "🎤 Voice chat started...");
                updateSendButtonState();

            } catch (err) {
                console.error("Failed to start recording:", err);
                if (err.message === "Session creation timeout") {
                    showError("⚠️ Session creation timeout. Please try again.");
                    addMessage("System", "⚠️ Session creation timeout");

        function convertToPCM16(float32Array) {
            const int16Array = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return int16Array.buffer;
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function queueAudioChunk(base64Audio) {
            try {
                // Decode base64 audio data and convert to Float32Array
                const binaryString = atob(base64Audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Convert to Int16Array (PCM16), then to Float32Array
                const int16Array = new Int16Array(bytes.buffer);
                const float32Array = new Float32Array(int16Array.length);

                for (let i = 0; i < int16Array.length; i++) {
                    float32Array[i] = int16Array[i] / 32768.0;
                }

                // Add decoded audio data to queue
                audioPlaybackQueue.push(float32Array);

                // If not playing yet, start player
                if (!isPlaying) {
                    startAudioPlayback();
                }
            } catch (err) {
                console.error("Failed to decode audio chunk:", err);
            }
        }

        function startAudioPlayback() {
            if (isPlaying) return;

            try {
                // Create separate AudioContext for playback
                if (!playbackAudioContext) {
                    playbackAudioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 24000
                    });
                }

                // If AudioContext is suspended (browser policy), resume it
                if (playbackAudioContext.state === 'suspended') {
                    playbackAudioContext.resume();
                }

                isPlaying = true;
                audioPlaybackIndex = 0;

                // Use ScriptProcessorNode for streaming playback
                const bufferSize = 4096;
                const processor = playbackAudioContext.createScriptProcessor(bufferSize, 0, 1);

                processor.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    const samplesNeeded = output.length;
                    let samplesWritten = 0;

                    // Get audio data from queue and fill output buffer
                    while (samplesWritten < samplesNeeded && audioPlaybackQueue.length > 0) {
                        const chunk = audioPlaybackQueue[0];

                        // Calculate number of samples to read from current chunk
                        const samplesToRead = Math.min(
                            samplesNeeded - samplesWritten,
                            chunk.length - audioPlaybackIndex
                        );

                        // Directly copy Float32 data to output
                        for (let i = 0; i < samplesToRead; i++) {
                            output[samplesWritten + i] = chunk[audioPlaybackIndex + i];
                        }

                        samplesWritten += samplesToRead;
                        audioPlaybackIndex += samplesToRead;

                        // If current chunk is finished, remove it and reset index
                        if (audioPlaybackIndex >= chunk.length) {
                            audioPlaybackQueue.shift();
                            audioPlaybackIndex = 0;
                        }
                    }

                    // If queue is empty and no more data, fill with silence
                    if (samplesWritten < samplesNeeded) {
                        for (let i = samplesWritten; i < samplesNeeded; i++) {
                            output[i] = 0;
                        }

                        // If queue continues to be empty for a while, stop playback
                        if (audioPlaybackQueue.length === 0) {
                            setTimeout(() => {
                                if (audioPlaybackQueue.length === 0) {
                                    stopAudioPlayback();
                                }
                            }, 100);
                        }
                    }
                };

                processor.connect(playbackAudioContext.destination);
                audioPlaybackNode = processor;

            } catch (err) {
                console.error("Failed to start audio playback:", err);
                isPlaying = false;
            }
        }

        function stopAudioPlayback() {
            if (audioPlaybackNode) {
                audioPlaybackNode.disconnect();
                audioPlaybackNode = null;
            }
            isPlaying = false;
            audioPlaybackQueue = [];
            audioPlaybackIndex = 0;
        }

        /**
         * Starts video recording by requesting camera access, displaying a
         * live preview, and initiating frame capture to the server at 1 fps.
         * Requires an active voice chat session (WebSocket connected and
         * session created).
         */
        async function startVideoRecording() {
            // Prevent duplicate starts
            if (isRecordingVideo) {
                return;
            }

            try {
                const videoBtn = document.getElementById("videoBtn");
                const videoPreview = document.getElementById("videoPreview");

                // Check if WebSocket is connected
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    showError("⚠️ WebSocket is not connected! Please wait for connection.");
                    return;
                }

                // Check if session is created
                if (!sessionCreated) {
                    showError("⚠️ Session not created yet! Please start voice chat first.");
                    return;
                }

                // Request video stream only (audio is already captured by voice chat)
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "user"
                    },
                    audio: false
                });

                // Show video preview
                videoPreview.srcObject = videoStream;
                videoPreview.classList.add("active");

                // Start sending video frames to server at 1 fps
                startSendingVideoFrames();

                isRecordingVideo = true;
                videoBtn.classList.add("recording-video");
                videoBtn.innerText = "🔴 停止视频采集";
                addMessage("System", "📹 视频采集已开启：约 1 秒/帧（后端按变化检测决定是否分析）");

                updateFatiguePanel();

            } catch (err) {
                console.error("Failed to start video recording:", err);
                showError("⚠️ Unable to access camera: " + err.message);
                addMessage("System", "⚠️ Unable to access camera: " + err.message);
            }
        }

        /**
         * Captures video frames from the preview element at 1 fps and sends
         * them to the server as base64-encoded JPEG images via WebSocket
         * using the client_image_append event.
         */
        function startSendingVideoFrames() {
            if (videoFrameInterval) {
                clearInterval(videoFrameInterval);
            }

            const videoPreview = document.getElementById("videoPreview");

            // Create canvas if needed
            if (!videoCanvas) {
                videoCanvas = document.createElement('canvas');
                videoCanvasCtx = videoCanvas.getContext('2d');
            }

            // Send frame cadence: ~1 second per frame
            videoFrameInterval = setInterval(function() {
                if (!isRecordingVideo || !videoStream || !videoPreview) {
                    return;
                }

                try {
                    // Check if video is ready
                    if (videoPreview.readyState < 2 || !videoPreview.videoWidth || !videoPreview.videoHeight) {
                        return;
                    }

                    // Set canvas size to match video
                    const videoWidth = videoPreview.videoWidth;
                    const videoHeight = videoPreview.videoHeight;
                    if (videoCanvas.width !== videoWidth || videoCanvas.height !== videoHeight) {
                        videoCanvas.width = videoWidth;
                        videoCanvas.height = videoHeight;
                    }

                    // Capture frame and convert to base64 JPEG
                    videoCanvasCtx.drawImage(videoPreview, 0, 0, videoWidth, videoHeight);
                    const base64Data = videoCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                    void collectVisualSignals(videoPreview);

                    // Send to server
                    if (ws && ws.readyState === WebSocket.OPEN && sessionCreated) {
                        ws.send(JSON.stringify({
                            type: "client_image_append",
                            session_id: sessionId,
                            image: base64Data,
                            format: {
                                type: "image/jpeg",
                                mime_type: "image/jpeg"
                            }
                        }));
                    }
                } catch (err) {
                    console.error("Failed to capture video frame:", err);
                }
            }, Math.round(1000 / currentVideoFps));
        }

        /**
         * Stops video recording by clearing the frame capture interval,
         * releasing the camera stream, and resetting the UI state.
         */
        function stopVideoRecording() {
            if (videoFrameInterval) {
                clearInterval(videoFrameInterval);
                videoFrameInterval = null;
            }

            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }

            const videoPreview = document.getElementById("videoPreview");
            if (videoPreview) {
                videoPreview.srcObject = null;
                videoPreview.classList.remove("active");

            const videoBtn = document.getElementById("videoBtn");
            isRecordingVideo = false;

        function renderPOICandidates(candidates, originCandidates, destinationCandidates) {
            let finalCandidates = Array.isArray(candidates) ? candidates.slice() : [];

            // 后端若只给分组候选，这里做前端兜底扁平化
            if (finalCandidates.length === 0) {
                const origin = Array.isArray(originCandidates) ? originCandidates : [];
                const destination = Array.isArray(destinationCandidates) ? destinationCandidates : [];
                origin.forEach(function(item) {
                    finalCandidates.push({ ...item, selection_group: "origin" });
                });
                destination.forEach(function(item) {
                    finalCandidates.push({ ...item, selection_group: "destination" });
                });
            }

            if (!finalCandidates || finalCandidates.length === 0) {
                addMessage("System", "⚠️ 找到了歧义地点，但候选列表为空");
                return;
            }

            // 按 selection_group 分组
            var groups = {};
            finalCandidates.forEach(function(poi, i) {
                var g = poi.selection_group || "other";
                if (!groups[g]) groups[g] = [];
                groups[g].push({ poi: poi, idx: i });

            var groupLabels = { origin: "起点候选", destination: "终点候选", other: "候选地点" };

            html += '<div class="nav-panel-body">';

            var groupNames = Object.keys(groups);
            groupNames.forEach(function(gName) {
                var items = groups[gName];
                html += '<div class="poi-group" data-group="' + gName + '">';
                html += '<div style="font-weight:bold;margin:6px 0 2px;">📌 ' + (groupLabels[gName] || gName) + '</div>';
                html += '<ul class="poi-candidates">';
                items.forEach(function(entry) {
                    var poi = entry.poi;
                    html += '<li data-idx="' + entry.idx + '" data-group="' + gName + '" style="cursor:pointer;padding:6px;border-bottom:1px solid #eee;">';
                    html += '<strong>' + (poi.name || "地点") + '</strong>';
                    html += '<br><span style="color:#666;">' + (poi.address || "") + '</span>';
                    html += '</li>';
                });
                html += '</ul></div>';
            });

            html += '</div>';

            poiDiv.innerHTML = html;
            panel.appendChild(poiDiv);
            panel.style.display = "block";

            // click handler — 选中后仅替换所属分组，保留其他分组继续选择
            poiDiv.querySelectorAll(".poi-candidates li").forEach(function(li) {
                li.addEventListener("click", function() {
                    var idx = parseInt(this.dataset.idx);
                    var group = this.dataset.group;
                    var selected = finalCandidates[idx];
                    addMessage("User", "选择: " + selected.name);

                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: "nav_poi_select",
                            index: idx,
                            poi: selected
                        }));
                    }

                    // 将该分组替换为已选标记
                    var groupDiv = poiDiv.querySelector('.poi-group[data-group="' + group + '"]');
                    if (groupDiv) {
                        groupDiv.innerHTML = '<div style="padding:6px;color:#2e7d32;font-weight:bold;">✅ 已选择: ' + selected.name + '</div>';
                    }

                    // 如果所有分组都已选完（没有剩余可点击项），移除面板
                    var remaining = poiDiv.querySelectorAll(".poi-candidates li");
                    if (remaining.length === 0) {
                        setTimeout(function() { poiDiv.remove(); }, 600);
                    }
                });
            });
        }

        // ═══════════════════════════════════════════
        //  高德地图集成
        // ═══════════════════════════════════════════
        var amapInstance = null;
        var amapReady = false;
        var amapMarkers = [];
        var amapPolyline = null;

        async function initAMap() {
            try {
                var resp = await fetch("/api/amap-key");
                var json = await resp.json();
                var amapKey = json.key;
                var amapSecret = json.secret;
                if (!amapKey) {
                    console.warn("[MAP] No AMAP_WEB_KEY, map disabled");
                    return;
                }
                // 动态加载高德 JS API 2.0
                await new Promise(function(resolve, reject) {
                    if (window.AMap) { resolve(); return; }
                    // 设置安全密钥（JS API 2.0 必须）
                    window._AMapSecurityConfig = {
                        securityJsCode: amapSecret || "",
                    };
                    var s = document.createElement("script");
                    s.src = "https://webapi.amap.com/maps?v=2.0&key=" + amapKey;
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });
                amapReady = true;
                console.log("[MAP] AMap JS API loaded");
            } catch (e) {
                console.error("[MAP] AMap load failed:", e);
            }
        }

        function ensureMap() {
            if (!amapReady || !window.AMap) return null;
            var container = document.getElementById("mapContainer");
            container.style.display = "block";
            if (!amapInstance) {
                amapInstance = new AMap.Map("mapInner", {
                    zoom: 13,
                    center: [114.35, 30.52],  // 武汉默认中心
                    resizeEnable: true,
                    viewMode: "2D",
                });
            }
            return amapInstance;
        }

        function clearMapOverlays() {
            if (!amapInstance) return;
            amapMarkers.forEach(function(m) { amapInstance.remove(m); });
            amapMarkers = [];
            if (amapPolyline) {
                amapInstance.remove(amapPolyline);
                amapPolyline = null;
            }
        }

        function parseLngLat(locStr) {
            // "114.317603,30.528545" → [114.317603, 30.528545]
            if (!locStr) return null;
            var parts = locStr.split(",");
            if (parts.length < 2) return null;
            return [parseFloat(parts[0]), parseFloat(parts[1])];
        }

        function showRouteOnMap(route) {
            var map = ensureMap();
            if (!map) return;
            clearMapOverlays();

            var originLngLat = parseLngLat(route.origin_location);
            var destLngLat = parseLngLat(route.destination_location);

            // 起点标注
            if (originLngLat) {
                var startMarker = new AMap.Marker({
                    position: originLngLat,
                    content: '<div style="background:#0f766e;color:#fff;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:bold;white-space:nowrap;">起 ' + (route.origin_name || '') + '</div>',
                    offset: new AMap.Pixel(-40, -12),
                });
                map.add(startMarker);
                amapMarkers.push(startMarker);
            }

            // 终点标注
            if (destLngLat) {
                var endMarker = new AMap.Marker({
                    position: destLngLat,
                    content: '<div style="background:#b45309;color:#fff;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:bold;white-space:nowrap;">终 ' + (route.destination_name || '') + '</div>',
                    offset: new AMap.Pixel(-40, -12),
                });
                map.add(endMarker);
                amapMarkers.push(endMarker);
            }

            // 路线折线 — AMap v5 polyline: "lng,lat;lng,lat;..." 多段用 ; 拼接
            if (route.polyline) {
                var pathArr = [];
                var pairs = route.polyline.split(";");
                pairs.forEach(function(pair) {
                    var coords = pair.trim().split(",");
                    if (coords.length >= 2) {
                        var lng = parseFloat(coords[0]);
                        var lat = parseFloat(coords[1]);
                        if (!isNaN(lng) && !isNaN(lat)) {
                            pathArr.push(new AMap.LngLat(lng, lat));
                        }
                    }
                });
                if (pathArr.length > 1) {
                    amapPolyline = new AMap.Polyline({
                        path: pathArr,
                        strokeColor: "#2563eb",
                        strokeWeight: 6,
                        strokeOpacity: 0.85,
                        lineJoin: "round",
                        lineCap: "round",
                    });
                    map.add(amapPolyline);
                }
            }

            // 自适应视野
            var fitItems = amapMarkers.slice();
            if (amapPolyline) fitItems.push(amapPolyline);
            if (fitItems.length > 0) {
                map.setFitView(fitItems, false, [60, 60, 60, 60]);
            }
        }

        function showCandidatesOnMap(candidates) {
            var map = ensureMap();
            if (!map) return;
            clearMapOverlays();

            var bounds = [];
            var colors = { origin: "#0f766e", destination: "#b45309", other: "#2563eb" };

            candidates.forEach(function(poi, i) {
                var lngLat = parseLngLat(poi.location);
                if (!lngLat) return;
                var group = poi.selection_group || "other";
                var color = colors[group] || "#2563eb";
                var label = group === "origin" ? "起" : (group === "destination" ? "终" : "");

                var marker = new AMap.Marker({
                    position: lngLat,
                    content: '<div style="background:' + color + ';color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:bold;white-space:nowrap;cursor:pointer;">' + label + (i + 1) + ' ' + (poi.name || '') + '</div>',
                    offset: new AMap.Pixel(-40, -12),
                });
                map.add(marker);
                amapMarkers.push(marker);
                bounds.push(lngLat);
            });

            if (bounds.length > 0) {
                map.setFitView(amapMarkers, false, [60, 60, 60, 60]);
            }
        }
        // ═══════════════════════════════════════════

        window.onload = async function() {
            initFaceDetector();
            updateFatiguePanel();
            await checkAvailableModels();
            await initAMap();
            connect();
        };
    </script>
</body>
